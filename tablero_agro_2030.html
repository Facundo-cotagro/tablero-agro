<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tablero de Gestión — División Agro 2030</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f5f5f3;--bg3:#eeece8;
  --text:#1a1a18;--text2:#6b6b67;--text3:#9b9b97;
  --border:rgba(0,0,0,.11);--border2:rgba(0,0,0,.20);
  --rmd:8px;--rlg:12px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --blue:#185FA5;--blue2:#0C447C;--bluel:#E6F1FB;
}
body{font-family:var(--font);background:var(--bg3);color:var(--text);font-size:14px;min-height:100vh}
.layout{display:flex;min-height:100vh;align-items:flex-start}
.main{flex:0 0 68%;padding:1.75rem 1.25rem 2rem 1.75rem;min-width:0}
.sidebar{flex:0 0 32%;padding:1.75rem 1.75rem 2rem 0;position:sticky;top:0;max-height:100vh;overflow-y:auto}
@media(max-width:780px){.layout{flex-direction:column}.main,.sidebar{flex:none;width:100%;padding:1rem}.sidebar{position:static;max-height:none}}
/* HEADER */
.hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.5rem;gap:10px;flex-wrap:wrap}
.hdr h1{font-size:18px;font-weight:500}
.hdr p{font-size:12px;color:var(--text2);margin-top:3px}
.hdr-btns{display:flex;gap:7px;flex-wrap:wrap}
/* BUTTONS */
.btn{padding:6px 13px;border-radius:var(--rmd);font-size:12px;cursor:pointer;font-family:var(--font);display:inline-flex;align-items:center;gap:5px;border:.5px solid var(--border2);background:var(--bg);color:var(--text2);transition:background .12s}
.btn:hover{background:var(--bg2)}
.btn-p{background:var(--blue);color:var(--bluel);border-color:var(--blue);font-weight:500}
.btn-p:hover{background:var(--blue2);color:var(--bluel)}
.btn-d{color:#D85A30;border-color:#F0997B}
.btn-d:hover{background:#FAECE7}
.btn-sm{padding:5px 10px;font-size:12px}
/* CATEGORIES */
.cats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.cc{background:var(--bg);border:.5px solid var(--border);border-radius:var(--rlg);overflow:hidden}
.ch{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:.5px solid var(--border)}
.ct{font-size:11px;font-weight:500;letter-spacing:.05em}
.cn{font-size:10px;padding:2px 7px;border-radius:99px;font-weight:500}
.c-r .ch{background:#E6F1FB}.c-r .ct{color:#0C447C}.c-r .cn{background:#B5D4F4;color:#0C447C}
.c-e .ch{background:#E1F5EE}.c-e .ct{color:#085041}.c-e .cn{background:#9FE1CB;color:#085041}
.c-i .ch{background:#EEEDFE}.c-i .ct{color:#3C3489}.c-i .cn{background:#CECBF6;color:#3C3489}
.c-d .ch{background:#FAEEDA}.c-d .ct{color:#633806}.c-d .cn{background:#FAC775;color:#633806}
.cb{padding:8px;min-height:100px}
.vi{padding:7px 9px;border-radius:var(--rmd);border:.5px solid var(--border);margin-bottom:5px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;background:var(--bg)}
.vi:hover{background:var(--bg2)}
.vn{font-size:12px;font-weight:500}
.vm{font-size:11px;color:var(--text2);margin-top:1px}
.vr{display:flex;align-items:center;gap:7px;flex-shrink:0}
.dot{width:7px;height:7px;border-radius:50%}
.dok{background:#1D9E75}.drisk{background:#EF9F27}.dpend{background:#888780}
.ab{font-size:10px;padding:1px 6px;border-radius:99px;background:var(--bg2);color:var(--text2);border:.5px solid var(--border)}
.avb{width:100%;padding:6px;border:.5px dashed var(--border2);border-radius:var(--rmd);background:transparent;color:var(--text2);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;font-family:var(--font)}
.avb:hover{background:var(--bg2);color:var(--text)}
.cf{padding:0 8px 8px}
.es{text-align:center;padding:18px 10px;color:var(--text2);font-size:12px}
.es i{font-size:22px;display:block;margin-bottom:5px;opacity:.3}
/* SIDEBAR */
.sc{background:var(--bg);border:.5px solid var(--border);border-radius:var(--rlg);overflow:hidden}
.sh{padding:12px 14px;border-bottom:.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:1}
.st{font-size:12px;font-weight:500;display:flex;align-items:center;gap:7px}
.ac{font-size:10px;padding:2px 7px;border-radius:99px;background:#FAEEDA;color:#633806;font-weight:500}
.sb{padding:8px}
.af{display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap}
.fb{font-size:11px;padding:3px 9px;border-radius:99px;border:.5px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;font-family:var(--font)}
.fb.on{background:var(--blue);color:var(--bluel);border-color:var(--blue)}
.ai{padding:9px 10px;border-radius:var(--rmd);border:.5px solid var(--border);margin-bottom:6px;background:var(--bg);cursor:pointer}
.ai:hover{background:var(--bg2)}
.ai.v{border-left:3px solid #D85A30;padding-left:8px}
.ai.h{border-left:3px solid #EF9F27;padding-left:8px}
.ai.p{border-left:3px solid #1D9E75;padding-left:8px}
.ai.s{border-left:3px solid #888780;padding-left:8px}
.ad{font-size:12px;font-weight:500;line-height:1.35}
.ar{font-size:11px;color:var(--text2);margin-top:2px}
.ab2{display:flex;align-items:center;justify-content:space-between;margin-top:5px;flex-wrap:wrap;gap:4px}
.av{font-size:10px;padding:1px 6px;border-radius:99px;font-weight:500;white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis}
.af2{font-size:11px;font-weight:500}
.fv{color:#D85A30}.fh{color:#BA7517}.fp{color:#1D9E75}.fs{color:var(--text3)}
.ae{font-size:10px;padding:2px 7px;border-radius:99px}
.ep{background:#F1EFE8;color:#5F5E5A}.ec{background:#FAEEDA;color:#633806}
.ae2{text-align:center;padding:20px 10px;color:var(--text2);font-size:12px}
.ae2 i{font-size:24px;display:block;margin-bottom:6px;opacity:.3}
.df{font-size:10px;font-weight:500;color:var(--text3);letter-spacing:.05em;text-transform:uppercase;margin:10px 0 5px;padding-left:2px}
/* OVERLAY / MODAL */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center;padding:1rem}
.ov.on{display:flex}
.md{background:var(--bg);border-radius:var(--rlg);border:.5px solid var(--border);width:700px;max-width:100%;max-height:90vh;overflow-y:auto}
.md-xl{width:1100px}
.md-sm{width:440px}
.mh{padding:14px 18px;border-bottom:.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:2}
.mt{font-size:15px;font-weight:500}
.mb{padding:18px}
.xb{background:transparent;border:none;cursor:pointer;color:var(--text2);font-size:18px;display:flex;align-items:center;padding:4px 6px;border-radius:var(--rmd)}
.xb:hover{background:var(--bg2)}
.bc{font-size:11px;padding:2px 9px;border-radius:99px;font-weight:500;display:inline-block;margin-top:3px}
/* FORM */
.fr{margin-bottom:12px}
.fr label{display:block;font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:500;letter-spacing:.04em}
.fr input[type=text],.fr input[type=date],.fr select,.fr textarea{width:100%;padding:7px 9px;border:.5px solid var(--border2);border-radius:var(--rmd);background:var(--bg);color:var(--text);font-size:13px;font-family:var(--font);outline:none}
.fr input:focus,.fr select:focus,.fr textarea:focus{border-color:#378ADD}
.fr textarea{resize:vertical;min-height:56px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ss{font-size:11px;font-weight:500;color:var(--text2);letter-spacing:.05em;text-transform:uppercase;margin:18px 0 9px;padding-top:14px;border-top:.5px solid var(--border)}
.ss.f{margin-top:0;border-top:none;padding-top:0}
/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:5px 7px;font-size:11px;font-weight:500;color:var(--text2);border-bottom:.5px solid var(--border)}
.tbl td{padding:5px 7px;border-bottom:.5px solid var(--border);vertical-align:middle}
.ti{width:100%;border:none;background:transparent;font-size:13px;color:var(--text);font-family:var(--font);padding:2px 3px;outline:none}
.ti:focus{background:var(--bg2);border-radius:3px}
.ok{color:#1D9E75;font-weight:500}.mal{color:#D85A30;font-weight:500}
.atbl th{background:var(--bg2)}
.esel{font-size:12px;padding:3px 7px;border-radius:99px;border:.5px solid var(--border2);cursor:pointer;font-family:var(--font);outline:none}
.esp{background:#F1EFE8;color:#5F5E5A;border-color:#B4B2A9}
.esc{background:#FAEEDA;color:#633806;border-color:#EF9F27}
.ese{background:#E1F5EE;color:#085041;border-color:#1D9E75}
.db{background:transparent;border:none;cursor:pointer;color:var(--text2);font-size:14px;padding:3px 5px;border-radius:4px}
.db:hover{color:#D85A30;background:#FAECE7}
.aar{display:grid;grid-template-columns:2fr 1fr 1fr auto auto;gap:5px;margin-top:8px;align-items:center}
.aar input,.aar select{padding:6px 8px;border:.5px solid var(--border2);border-radius:var(--rmd);font-size:12px;font-family:var(--font);background:var(--bg);color:var(--text);outline:none}
/* NOTAS */
.nb{background:var(--bg2);border-radius:var(--rmd);padding:9px}
.ni{font-size:13px;padding:5px 0;border-bottom:.5px solid var(--border)}
.ni:last-child{border-bottom:none}
.nm{font-size:11px;color:var(--text2);margin-top:2px}
.nd{cursor:pointer;color:#D85A30;margin-left:8px}
.ne{width:100%;border:none;background:transparent;font-size:13px;color:var(--text);font-family:var(--font);resize:vertical;min-height:38px;outline:none;padding:2px 4px;border-radius:4px;line-height:1.5}
.ne:focus{background:var(--bg)}
.anr{display:flex;gap:7px;margin-top:9px}
.anr input{flex:1;padding:7px 9px;border:.5px solid var(--border2);border-radius:var(--rmd);font-size:13px;font-family:var(--font);background:var(--bg);color:var(--text);outline:none}
.br{display:flex;gap:7px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:.5px solid var(--border);flex-wrap:wrap}
/* RENTABILIDAD */
.rh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.rej{display:flex;align-items:center;gap:8px}
.rej select{padding:5px 9px;border:.5px solid var(--border2);border-radius:var(--rmd);font-size:12px;font-family:var(--font);background:var(--bg);color:var(--text);outline:none}
.rtabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px}
.rtab{font-size:11px;padding:5px 11px;border-radius:99px;border:.5px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;font-family:var(--font)}
.rtab.on{background:var(--blue);color:var(--bluel);border-color:var(--blue)}
.rtw{overflow-x:auto;margin-bottom:20px}
.rtbl{width:100%;border-collapse:collapse;font-size:12px;min-width:900px}
.rtbl th{padding:6px 8px;text-align:center;font-size:10px;font-weight:500;color:var(--text2);border-bottom:.5px solid var(--border);white-space:nowrap;background:var(--bg2)}
.rtbl th.rl{text-align:left;min-width:160px;position:sticky;left:0;background:var(--bg2);z-index:1}
.rtbl td{padding:4px 6px;border-bottom:.5px solid var(--border);text-align:center;white-space:nowrap}
.rtbl td.rl{text-align:left;font-size:11px;font-weight:500;color:var(--text2);position:sticky;left:0;background:var(--bg);z-index:1;padding-left:8px}
.rtbl td.rl.mr{color:var(--text);font-weight:600;background:#f8f8f6}
.rtbl tr.mr td{background:#f8f8f6}
.rtbl tr.rr td{background:#EEF5FF}
.rtbl td.rl.rr{background:#EEF5FF;color:var(--blue2);font-weight:700}
.ri{width:80px;border:none;background:transparent;font-size:12px;color:var(--text);font-family:var(--font);text-align:right;padding:2px 3px;outline:none}
.ri:focus{background:var(--bg2);border-radius:3px}
.rc{font-size:12px;font-weight:500;text-align:right;padding-right:4px}
.rc.pos{color:#1D9E75}.rc.neg{color:#D85A30}
.rrat{font-size:12px;font-weight:700;color:var(--blue2);text-align:right;padding-right:4px}
.cg{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:20px}
.ccard{background:var(--bg2);border-radius:var(--rmd);padding:12px;border:.5px solid var(--border)}
.ccard canvas{max-height:180px}
.ctitle{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:8px}



/* DRIVE SYNC */
.drive-bar { display: flex; align-items: center; gap: 10px; padding: 8px 14px; background: var(--bg); border: .5px solid var(--border); border-radius: var(--rlg); margin-bottom: 14px; flex-wrap: wrap; }
.drive-status { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--text2); }
.drive-dot { width: 8px; height: 8px; border-radius: 50%; background: #888780; flex-shrink: 0; }
.drive-dot.connected { background: #1D9E75; }
.drive-dot.syncing { background: #EF9F27; animation: pulse .8s infinite alternate; }
.drive-dot.error { background: #D85A30; }
@keyframes pulse { from { opacity: 1; } to { opacity: .3; } }
.drive-user { font-size: 11px; color: var(--text2); }
.drive-actions { display: flex; gap: 6px; margin-left: auto; }
.drive-last { font-size: 10px; color: var(--text3); }
/* NOMBRE ACTIVIDAD */
.act-name-cell { min-width: 160px; max-width: 220px; }
.act-name-input { width: 100%; border: none; background: transparent; font-size: 12px; color: var(--text); font-family: var(--font); padding: 2px 3px; outline: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.act-name-input:focus { background: var(--bg2); border-radius: 3px; white-space: normal; overflow: visible; }

/* ADJUNTOS */
.adjuntos-section { margin-top: 10px; }
.adjuntos-title { font-size: 11px; font-weight: 500; color: var(--text2); margin-bottom: 5px; }
.adjunto-item { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: .5px solid var(--border); }
.adjunto-item:last-child { border-bottom: none; }
.adjunto-thumb { width: 36px; height: 36px; object-fit: cover; border-radius: 4px; border: .5px solid var(--border); cursor: pointer; flex-shrink: 0; }
.adjunto-icon { width: 36px; height: 36px; border-radius: 4px; border: .5px solid var(--border); display: flex; align-items: center; justify-content: center; background: var(--bg3); flex-shrink: 0; font-size: 18px; color: var(--text2); }
.adjunto-info { flex: 1; min-width: 0; }
.adjunto-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.adjunto-size { font-size: 10px; color: var(--text3); margin-top: 1px; }
.adjunto-btns { display: flex; gap: 5px; flex-shrink: 0; }
.adjunto-btn { background: transparent; border: .5px solid var(--border2); border-radius: var(--rmd); padding: 3px 8px; font-size: 11px; cursor: pointer; color: var(--text2); font-family: var(--font); display: inline-flex; align-items: center; gap: 3px; }
.adjunto-btn:hover { background: var(--bg2); }
.add-adjunto-btn { margin-top: 7px; width: 100%; padding: 6px; border: .5px dashed var(--border2); border-radius: var(--rmd); background: transparent; color: var(--text2); font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; font-family: var(--font); }
.add-adjunto-btn:hover { background: var(--bg2); color: var(--text); }
.img-lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85); z-index: 999; align-items: center; justify-content: center; padding: 2rem; }
.img-lightbox.on { display: flex; }
.img-lightbox img { max-width: 90vw; max-height: 85vh; border-radius: var(--rmd); box-shadow: 0 8px 32px rgba(0,0,0,.5); }
.img-lightbox-close { position: absolute; top: 1.2rem; right: 1.5rem; background: rgba(255,255,255,.15); border: none; color: #fff; font-size: 22px; cursor: pointer; border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; }
.img-lightbox-close:hover { background: rgba(255,255,255,.3); }
/* DETALLE ACTIVIDAD */
.act-detail-wrap { background: var(--bg2); border-radius: var(--rmd); padding: 10px 12px; margin-top: 6px; border: .5px solid var(--border); }
.act-detail-toggle { background: transparent; border: none; cursor: pointer; font-size: 11px; color: var(--text2); font-family: var(--font); display: flex; align-items: center; gap: 4px; padding: 0; margin-bottom: 0; }
.act-detail-toggle:hover { color: var(--text); }
.act-detail-body { display: none; margin-top: 8px; }
.act-detail-body.open { display: block; }
.act-detail-notes { width: 100%; border: .5px solid var(--border2); border-radius: var(--rmd); padding: 7px 9px; font-size: 12px; font-family: var(--font); background: var(--bg); color: var(--text); resize: vertical; min-height: 50px; outline: none; margin-bottom: 8px; }
.act-detail-notes:focus { border-color: #378ADD; }
.checklist-title { font-size: 11px; font-weight: 500; color: var(--text2); letter-spacing: .03em; margin-bottom: 6px; }
.checklist-item { display: flex; align-items: flex-start; gap: 8px; padding: 4px 0; border-bottom: .5px solid var(--border); }
.checklist-item:last-child { border-bottom: none; }
.checklist-item input[type=checkbox] { margin-top: 2px; cursor: pointer; accent-color: var(--blue); flex-shrink: 0; }
.checklist-item-text { flex: 1; font-size: 12px; color: var(--text); border: none; background: transparent; font-family: var(--font); outline: none; line-height: 1.4; resize: none; min-height: 20px; }
.checklist-item-text.done { text-decoration: line-through; color: var(--text3); }
.checklist-item-del { background: transparent; border: none; cursor: pointer; color: var(--text3); font-size: 13px; padding: 0 3px; flex-shrink: 0; }
.checklist-item-del:hover { color: #D85A30; }
.add-check-row { display: flex; gap: 6px; margin-top: 6px; }
.add-check-inp { flex: 1; padding: 5px 8px; border: .5px solid var(--border2); border-radius: var(--rmd); font-size: 12px; font-family: var(--font); background: var(--bg); color: var(--text); outline: none; }
.add-check-inp:focus { border-color: #378ADD; }
/* IMPORT ZONE */
.imp-zone{border:1.5px dashed var(--border2);border-radius:var(--rmd);padding:16px;text-align:center;color:var(--text2);font-size:12px;margin-bottom:10px;cursor:pointer}
.imp-zone:hover{background:var(--bg2);border-color:var(--blue)}
/* TOAST */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;font-size:13px;padding:9px 18px;border-radius:var(--rmd);opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.on{opacity:1}
</style>
</head>
<body>

<div class="layout">
  <!-- MAIN -->
  <div class="main">
    <div class="drive-bar" id="driveBar">
      <div class="drive-status">
        <div class="drive-dot" id="driveDot"></div>
        <span id="driveStatusTxt">No conectado a Google Drive</span>
      </div>
      <div class="drive-user" id="driveUser"></div>
      <div class="drive-last" id="driveLast"></div>
      <div class="drive-actions">
        <button class="btn btn-p btn-sm" id="btnDriveConnect" onclick="driveLogin()" disabled style="opacity:.6"><i class="ti ti-brand-google-drive"></i> Conectar Drive</button>
        <button class="btn btn-sm" id="btnDriveSync" onclick="driveSave()" style="display:none"><i class="ti ti-cloud-upload"></i> Guardar en Drive</button>
        <button class="btn btn-sm" id="btnDriveLoad" onclick="driveLoad()" style="display:none"><i class="ti ti-cloud-download"></i> Cargar desde Drive</button>
        <button class="btn btn-sm" id="btnDriveDisconnect" onclick="driveLogout()" style="display:none"><i class="ti ti-logout"></i> Desconectar</button>
      </div>
    </div>
    <div class="hdr">
      <div><h1>Tablero de gestión — División Agro</h1><p>Horizonte 2030 · Cotagro Cooperativa Limitada</p></div>
      <div class="hdr-btns">
        <button class="btn" id="btnImpJSON"><i class="ti ti-upload"></i> Importar</button>
        <button class="btn" id="btnExpJSON"><i class="ti ti-download"></i> Exportar</button>
        <input type="file" id="inpJSON" accept=".json" style="display:none"/>
      </div>
    </div>
    <div class="cats">
      <div class="cc c-r">
        <div class="ch"><span class="ct">RESULTADO</span><span class="cn" id="cnt-resultado">0 variables</span></div>
        <div class="cb" id="bd-resultado"></div>
        <div class="cf"><button class="avb" id="add-resultado"><i class="ti ti-plus"></i> Agregar variable</button></div>
      </div>
      <div class="cc c-e">

<script>
// ── CONSTANTES ──
const CAT_LABELS={resultado:'RESULTADO',externas:'EXTERNAS',internas:'INTERNAS',desarrollo:'EN DESARROLLO'};
const CAT_COL={resultado:{bg:'#B5D4F4',tx:'#0C447C'},externas:{bg:'#9FE1CB',tx:'#085041'},internas:{bg:'#CECBF6',tx:'#3C3489'},desarrollo:{bg:'#FAC775',tx:'#633806'}};
const EST={pendiente:{l:'Pendiente',s:'ep',ss:'esp'},'en-curso':{l:'En curso',s:'ec',ss:'esc'},ejecutada:{l:'Ejecutada',s:'ee',ss:'ese'}};
const NEGOCIOS=['Transporte','DTA','Granos','Fab. Máquinas','Combustible','Soluciones Agrícolas'];
const NMAP={'Transporte':0,'DTA':1,'Granos':2,'Fab. Maquinas':3,'Fab. Máquinas':3,'Combustible':4,'Combustibles':4,'Soluciones Agricolas':5,'Soluciones Agrícolas':5};
const FILAS=['evolucion','ingreso','gasto','rdoOper','gastosAdmin','rdoNeto','reservas','difMensual','ratio'];
const FLAB={evolucion:'Evolución ($)',ingreso:'Ingreso ($)',gasto:'Gasto ($)',rdoOper:'Rdo. Oper. (Ing−Gasto)',gastosAdmin:'Gastos Admin. ($)',rdoNeto:'Rdo. Neto ($)',reservas:'Reservas ($)',difMensual:'Dif. Mensual Rdo Oper.',ratio:'Ratio Rdo.Oper / Evolución'};
const FEDIT={evolucion:true,ingreso:true,gasto:true,rdoOper:false,gastosAdmin:true,rdoNeto:false,reservas:true,difMensual:false,ratio:false};
const MESES=['Nov','Dic','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct'];
const SK='tablero_agro_v5';

let S={variables:[],rentabilidad:{},ejercicios:[]};
let curId=null, nuevaCat=null, filtro='todas';
let rentEj='25-26', rentNeg=0;
let charts={};

// ── UTILS ──
function load(){try{const s=localStorage.getItem(SK);if(s){S=JSON.parse(s);if(!S.rentabilidad)S.rentabilidad={};if(!S.ejercicios)S.ejercicios=[];}}catch(e){S={variables:[],rentabilidad:{},ejercicios:[]};}}
function save(){try{localStorage.setItem(SK,JSON.stringify(S));}catch(e){}}
function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function h(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function anios(){const a=[];for(let y=2025;y<=2030;y++)a.push(y);return a;}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2400);}
function fmtP(v){if(v===''||v===null||v===undefined)return'';const n=parseFloat(v);if(isNaN(n))return'';return new Intl.NumberFormat('es-AR',{minimumFractionDigits:0,maximumFractionDigits:0}).format(n);}
function fmtI(v){if(v===''||v===null||v===undefined)return'';const n=parseFloat((v||'').toString().replace(/[^0-9,.\-]/g,'').replace(',','.'));if(isNaN(n))return'';return new Intl.NumberFormat('es-AR',{minimumFractionDigits:0,maximumFractionDigits:0}).format(n);}
function parseP(s){return parseFloat((s||'').toString().replace(/[^0-9,.\-]/g,'').replace(',','.'));}
function isRent(v){return v&&v.nombre&&v.nombre.toUpperCase().includes('RENTABILIDAD');}

// ── WIRING (después de DOMContentLoaded) ──
document.addEventListener('DOMContentLoaded',function(){
  // JSON import/export
  document.getElementById('btnExpJSON').addEventListener('click',exportJSON);
  document.getElementById('btnImpJSON').addEventListener('click',()=>document.getElementById('inpJSON').click());
  document.getElementById('inpJSON').addEventListener('change',importJSON);

  // Agregar variables
  ['resultado','externas','internas','desarrollo'].forEach(cat=>{
    document.getElementById('add-'+cat).addEventListener('click',()=>abrirNueva(cat));
  });

  // Cerrar modales
  document.getElementById('cerrarNueva').addEventListener('click',cerrarNueva);
  document.getElementById('cancelarNueva').addEventListener('click',cerrarNueva);
  document.getElementById('confirmarNueva').addEventListener('click',crearVar);
  document.getElementById('cerrarVar').addEventListener('click',cerrarVar);
  document.getElementById('cerrarRent').addEventListener('click',cerrarRent);

  // Click fuera cierra
  document.getElementById('ovNueva').addEventListener('click',function(e){if(e.target===this)cerrarNueva();});
  document.getElementById('ovVar').addEventListener('click',function(e){if(e.target===this)cerrarVar();});
  document.getElementById('ovRent').addEventListener('click',function(e){if(e.target===this)cerrarRent();});

  // Escape cierra
  document.addEventListener('keydown',e=>{if(e.key==='Escape'){cerrarNueva();cerrarVar();cerrarRent();}});

  // Filtros agenda
  document.querySelectorAll('.fb').forEach(b=>{
    b.addEventListener('click',function(){
      document.querySelectorAll('.fb').forEach(x=>x.classList.remove('on'));
      this.classList.add('on');
      filtro=this.dataset.f;
      renderAgenda();
    });
  });

  load();
  renderAll();
});

// ── IMPORT / EXPORT ──
function exportJSON(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='tablero_agro_2030_datos.json';a.click();
  toast('Datos exportados');
}
function importJSON(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=function(ev){
    try{
      const p=JSON.parse(ev.target.result);
      if(!p.variables)throw new Error('Formato inválido');
      if(!confirm('Importar '+p.variables.length+' variables. Reemplaza los datos actuales. ¿Continuar?'))return;
      S=p;
      if(!S.rentabilidad)S.rentabilidad={};
      if(!S.ejercicios)S.ejercicios=[];
      save();renderAll();toast('Datos importados');
    }catch(err){alert('Archivo no válido: '+err.message);}
  };
  r.readAsText(file);e.target.value='';
}

// ── RENTABILIDAD DATA ──
function getRV(ej,neg,mes,fila){return(S.rentabilidad[ej+'__'+neg+'__'+mes]||{})[fila]??'';}
function setRV(ej,neg,mes,fila,val){const k=ej+'__'+neg+'__'+mes;if(!S.rentabilidad[k])S.rentabilidad[k]={};S.rentabilidad[k][fila]=val;save();}
function calcMes(ej,neg,mes){
  const ing=parseP(getRV(ej,neg,mes,'ingreso'))||0;
  const gas=parseP(getRV(ej,neg,mes,'gasto'))||0;
  const gadm=parseP(getRV(ej,neg,mes,'gastosAdmin'))||0;
  const evo=parseP(getRV(ej,neg,mes,'evolucion'))||0;
  const rdoOper=ing-gas;
  const rdoNeto=rdoOper-gadm;
  const ratio=evo!==0?rdoOper/evo*100:null;
  const mi=MESES.indexOf(mes);
  let dif=null;
  if(mi>0){const mp=MESES[mi-1];const ip=parseP(getRV(ej,neg,mp,'ingreso'))||0;const gp=parseP(getRV(ej,neg,mp,'gasto'))||0;dif=rdoOper-(ip-gp);}
  return{rdoOper,rdoNeto,ratio,dif};
}
function getEjs(){
  const s=new Set(['25-26']);
  Object.keys(S.rentabilidad).forEach(k=>{const p=k.split('__');if(p[0])s.add(p[0]);});
  (S.ejercicios||[]).forEach(e=>s.add(e));
  return Array.from(s).sort();
}

// ── ABRIR / CERRAR RENT ──
function abrirRent(){renderRent();document.getElementById('ovRent').classList.add('on');}
function cerrarRent(){document.getElementById('ovRent').classList.remove('on');destroyCharts();}
function destroyCharts(){Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});charts={};}

// ── RENDER RENTABILIDAD ──
function renderRent(){
  destroyCharts();
  const ejs=getEjs();
  let html='';

  // Header ejercicio + importar CSV
  html+='<div class="rh">';
  html+='<div class="rej"><label style="font-size:11px;font-weight:500;color:var(--text2);margin-right:6px">EJERCICIO</label>';
  html+='<select id="rejSel" onchange="rentEj=this.value;renderRent()">';
  ejs.forEach(e=>html+='<option value="'+h(e)+'"'+(e===rentEj?' selected':'')+'>'+h(e)+'</option>');
  html+='</select>';
  html+='<button class="btn btn-sm" style="margin-left:6px" onclick="addEjercicio()"><i class="ti ti-plus"></i> Ejercicio</button></div>';
  html+='<div style="display:flex;gap:7px">';
  html+='<button class="btn btn-sm btn-p" onclick="document.getElementById(\'inpCSV\').click()"><i class="ti ti-table-import"></i> Importar CSV</button>';
  html+='<input type="file" id="inpCSV" accept=".csv" style="display:none"/>';
  html+='<button class="btn btn-sm" onclick="descargarPlantilla()"><i class="ti ti-download"></i> Plantilla CSV</button>';
  html+='</div></div>';

  // Tabs negocios
  html+='<div class="rtabs">';
  NEGOCIOS.forEach((n,i)=>html+='<button class="rtab'+(i===rentNeg?' on':'')+'" onclick="rentNeg='+i+';renderRent()">'+h(n)+'</button>');
  html+='<button class="rtab'+(rentNeg===-1?' on':'')+'" onclick="rentNeg=-1;renderRent()"><i class="ti ti-layout-grid"></i> Consolidado</button>';
  html+='</div>';

  // Consolidado
  if(rentNeg===-1){
    html+=renderConsolidado();
  } else {

  // Tabla individual
  html+='<div class="rtw"><table class="rtbl"><thead><tr><th class="rl">Indicador</th>';
  MESES.forEach(m=>html+='<th>'+m+'</th>');
  html+='<th>Total/Prom</th></tr></thead><tbody>';

  FILAS.forEach(fila=>{
    const isMR=['rdoOper','rdoNeto','ratio'].includes(fila);
    const isRR=fila==='ratio';
    const trCls=isRR?'rr':isMR?'mr':'';
    html+='<tr class="'+trCls+'"><td class="rl'+(isRR?' rr':isMR?' mr':'')+'">'+FLAB[fila]+'</td>';
    let total=0,cnt=0,ratRdoSum=0,ratEvoSum=0;
    MESES.forEach((mes,mi)=>{
      if(FEDIT[fila]){
        const val=getRV(rentEj,rentNeg,mes,fila);
        html+='<td><input class="ri" type="text" value="'+h(val)+'" placeholder="0" onchange="setRV(\''+rentEj+'\','+rentNeg+',\''+mes+'\',\''+fila+'\',this.value);recalc()" onblur="recalc()"/></td>';
        const n=parseP(val);if(!isNaN(n)&&n!==0){total+=n;cnt++;}
      } else {
        const c=calcMes(rentEj,rentNeg,mes);
        const v=fila==='difMensual'?c.dif:fila==='ratio'?c.ratio:c[fila];
        if(fila==='ratio'){
          const t=v!==null?v.toFixed(2)+'%':'—';
          const cl=v!==null?(v>=0?'pos':'neg'):'';
          html+='<td id="rc_'+fila+'_'+mi+'" class="rrat '+cl+'">'+t+'</td>';
          if(v!==null){total+=v;cnt++;}
          // Acumular para ratio total correcto
          const _rdo=calcMes(rentEj,rentNeg,mes).rdoOper;
          const _evo=parseP(getRV(rentEj,rentNeg,mes,'evolucion'))||0;
          ratRdoSum+=_rdo; ratEvoSum+=_evo;
        } else {
          const t=v!==null?fmtP(v):'—';
          const cl=v!==null?(v>=0?'pos':'neg'):'';
          html+='<td id="rc_'+fila+'_'+mi+'" class="rc '+cl+'">'+t+'</td>';
          if(v!==null){total+=v;cnt++;}
        }
      }
    });
    // Total / Promedio
    if(fila==='ratio'){
      const ratTotal=ratEvoSum!==0?ratRdoSum/ratEvoSum*100:null;
      const ratTxt=ratTotal!==null?ratTotal.toFixed(2)+'%':'—';
      const ratCls=ratTotal!==null?(ratTotal>=0?'pos':'neg'):'';
      html+='<td class="rrat '+ratCls+'">'+ratTxt+'</td>';
    } else if(FEDIT[fila]){
      html+='<td class="rc '+(total>=0?'pos':'neg')+'">'+fmtP(total)+'</td>';
    } else {
      html+='<td class="rc '+(total>=0?'pos':'neg')+'">'+fmtP(total)+'</td>';
    }
    html+='</tr>';
  });
  html+='</tbody></table></div>';

  // Gráficos
  html+='<div class="ss">Gráficos — '+h(NEGOCIOS[rentNeg])+'</div>';
  html+='<div class="cg">';
  html+='<div class="ccard"><div class="ctitle">Resultado Operativo mensual ($)</div><canvas id="chartRdo"></canvas></div>';
  html+='<div class="ccard"><div class="ctitle">Ratio Rdo.Oper / Evolución (%)</div><canvas id="chartRatio"></canvas></div>';
  html+='</div>';

  } // fin else individual

  // Plan de acción y notas de la variable rentabilidad
  const vr=S.variables.find(v=>isRent(v));
  if(vr) html+=renderActsNotas(vr,'rent');

  document.getElementById('rentCuerpo').innerHTML=html;

  // Wiring del CSV input (después de insertar en DOM)
  document.getElementById('inpCSV').addEventListener('change',importCSV);

  setTimeout(function(){buildCharts();formatRentInputs();},80);
}


function formatRentInputs(){
  document.querySelectorAll('.ri').forEach(function(inp){
    // Formatear valor actual si tiene número
    const raw = inp.value.trim();
    if(raw !== ''){
      const n = parseFloat(raw);
      if(!isNaN(n)) inp.value = fmtP(n);
    }
    // Al hacer foco: mostrar número limpio
    inp.addEventListener('focus', function(){
      const raw = this.value.replace(/\./g,'').replace(',','.');
      const n = parseFloat(raw);
      this.value = isNaN(n) ? '' : (n % 1 === 0 ? n.toString() : n.toString());
      this.select();
    });
    // Al salir: formatear y guardar
    inp.addEventListener('blur', function(){
      const raw = this.value.trim().replace(',','.');
      const n = parseFloat(raw);
      if(isNaN(n) || this.value.trim() === ''){
        this.value = '';
      } else {
        // Guardar valor crudo en data-raw
        const dataRaw = this.dataset.raw;
        // Formatear
        this.value = fmtP(n);
      }
      recalc();
    });
  });
}
function recalc(){
  MESES.forEach((mes,mi)=>{
    const c=calcMes(rentEj,rentNeg,mes);
    ['rdoOper','rdoNeto','difMensual','ratio'].forEach(fila=>{
      const el=document.getElementById('rc_'+fila+'_'+mi);if(!el)return;
      const v=fila==='difMensual'?c.dif:fila==='ratio'?c.ratio:c[fila];
      if(fila==='ratio'){el.textContent=v!==null?v.toFixed(2)+'%':'—';el.className='rrat '+(v!==null?(v>=0?'pos':'neg'):'');}
      else{el.textContent=v!==null?fmtP(v):'—';el.className='rc '+(v!==null?(v>=0?'pos':'neg'):'');}
    });
  });
  buildCharts();
}

function renderConsolidado(){
  let html='<div class="rtw"><table class="rtbl"><thead><tr><th class="rl">Negocio</th>';
  MESES.forEach(m=>html+='<th>'+m+'</th>');
  html+='<th>Total</th></tr></thead><tbody>';

  // Para cada negocio mostrar Rdo.Oper y Ratio
  const filasMostrar=['rdoOper','ratio'];
  const filaNombres={rdoOper:'Rdo. Oper.',ratio:'Ratio %'};

  NEGOCIOS.forEach((neg,ni)=>{
    // Fila nombre del negocio
    html+='<tr class="mr"><td class="rl mr" colspan="'+(MESES.length+2)+'">'+h(neg)+'</td></tr>';
    filasMostrar.forEach(fila=>{
      html+='<tr><td class="rl" style="padding-left:16px">'+filaNombres[fila]+'</td>';
      let total=0,cnt=0;
      MESES.forEach((mes,mi)=>{
        const c=calcMes(rentEj,ni,mes);
        const v=fila==='ratio'?c.ratio:c.rdoOper;
        if(fila==='ratio'){
          const t=v!==null?v.toFixed(2)+'%':'—';
          const cl=v!==null?(v>=0?'pos':'neg'):'';
          html+='<td class="rrat '+cl+'">'+t+'</td>';
          if(v!==null){total+=v;cnt++;}
        } else {
          const t=v!==null?fmtP(v):'—';
          const cl=v!==null?(v>=0?'pos':'neg'):'';
          html+='<td class="rc '+cl+'">'+t+'</td>';
          if(v!==null){total+=v;}
        }
      });
      if(fila==='ratio'){
        let _rs=0,_es=0;MESES.forEach(m=>{_rs+=calcMes(rentEj,ni,m).rdoOper;_es+=parseP(getRV(rentEj,ni,m,'evolucion'))||0;});const _rtt=_es!==0?_rs/_es*100:null;
        html+='<td class="rrat '+(_rtt!==null?(_rtt>=0?'pos':'neg'):'')+'">'+(_rtt!==null?_rtt.toFixed(2)+'%':'—')+'</td>';
      } else {
        html+='<td class="rc '+(total>=0?'pos':'neg')+'">'+fmtP(total)+'</td>';
      }
      html+='</tr>';
    });
  });

  // Fila TOTAL consolidado Rdo.Oper
  html+='<tr class="rr"><td class="rl rr">TOTAL Rdo.Oper.</td>';
  let gtotal=0;
  MESES.forEach((mes,mi)=>{
    let sum=0;
    NEGOCIOS.forEach((_,ni)=>{sum+=calcMes(rentEj,ni,mes).rdoOper;});
    gtotal+=sum;
    html+='<td class="rc '+(sum>=0?'pos':'neg')+'">'+fmtP(sum)+'</td>';
  });
  html+='<td class="rc '+(gtotal>=0?'pos':'neg')+'">'+fmtP(gtotal)+'</td>';
  html+='</tr>';

  // Fila TOTAL Evolución consolidado
  html+='<tr class="rr"><td class="rl rr">TOTAL Evolución</td>';
  let evoTotal=0;
  MESES.forEach((mes,mi)=>{
    let sum=0;
    NEGOCIOS.forEach((_,ni)=>{sum+=parseP(getRV(rentEj,ni,mes,'evolucion'))||0;});
    evoTotal+=sum;
    html+='<td class="rc pos">'+fmtP(sum)+'</td>';
  });
  html+='<td class="rc pos">'+fmtP(evoTotal)+'</td>';
  html+='</tr>';

  // Fila Ratio consolidado
  html+='<tr class="rr"><td class="rl rr">Ratio Consolidado</td>';
  let rRdoSum=0,rEvoSum=0;
  MESES.forEach((mes,mi)=>{
    let rdo=0,evo=0;
    NEGOCIOS.forEach((_,ni)=>{rdo+=calcMes(rentEj,ni,mes).rdoOper;evo+=parseP(getRV(rentEj,ni,mes,'evolucion'))||0;});
    const rat=evo!==0?rdo/evo*100:null;
    html+='<td class="rrat '+(rat!==null?(rat>=0?'pos':'neg'):'')+'">'+(rat!==null?rat.toFixed(2)+'%':'—')+'</td>';
    rRdoSum+=rdo;rEvoSum+=evo;
  });
  const ratTotal=rEvoSum!==0?rRdoSum/rEvoSum*100:null;
  html+='<td class="rrat '+(ratTotal!==null?(ratTotal>=0?'pos':'neg'):'')+'">'+(ratTotal!==null?ratTotal.toFixed(2)+'%':'—')+'</td>';
  html+='</tr>';

  html+='</tbody></table></div>';

  // Gráficos consolidados
  html+='<div class="ss">Gráficos consolidados</div><div class="cg">';
  html+='<div class="ccard" style="grid-column:1/3"><div class="ctitle">Resultado Operativo por negocio y mes ($) — barras agrupadas</div><canvas id="chartRdo" style="max-height:220px"></canvas></div>';

// ── IMPORT CSV ──
function importCSV(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=function(ev){
    try{
      const lines=ev.target.result.trim().split('\n');
      const headers=lines[0].split(',').map(h=>h.trim());
      let imp=0;
      lines.slice(1).filter(l=>l.trim()).forEach(line=>{
        const cols=line.split(',');
        const o={};headers.forEach((hh,i)=>o[hh]=(cols[i]||'').trim());
        const ej=o.ejercicio,mes=o.mes;
        const ni=NMAP[o.negocio];
        if(ni===undefined||!ej||!mes)return;
        const k=ej+'__'+ni+'__'+mes;
        if(!S.rentabilidad[k])S.rentabilidad[k]={};
        ['evolucion','ingreso','gasto','rdoOper','gastosAdmin','rdoNeto','reservas'].forEach(f=>{
          if(o[f]!==undefined&&o[f]!=='')S.rentabilidad[k][f]=o[f];
        });
        imp++;
      });
      save();toast(imp+' filas importadas correctamente');renderRent();
    }catch(err){alert('Error al leer CSV: '+err.message);}
  };
  r.readAsText(file);e.target.value='';
}

function descargarPlantilla(){
  const rows=['ejercicio,mes,negocio,evolucion,ingreso,gasto,rdoOper,gastosAdmin,rdoNeto,reservas'];
  MESES.forEach(mes=>NEGOCIOS.forEach(n=>rows.push('25-26,'+mes+','+n+',,,,,,,,')));
  const blob=new Blob([rows.join('\n')],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='plantilla_rentabilidad.csv';a.click();
}

// ── STATUS ──
function getStatus(v){const cd=v.series.filter(s=>s.logrado!=='');if(!cd.length)return'pend';const ul=cd[cd.length-1];if(!ul.objetivo)return'pend';const l=parseFloat(ul.logrado),o=parseFloat(ul.objetivo);if(isNaN(l)||isNaN(o))return'pend';return l>=o*.95?'ok':'risk';}
function lastLog(v){const cd=v.series.filter(s=>s.logrado!=='');return cd.length?cd[cd.length-1]:null;}
function pendActs(v){return(v.actividades||[]).filter(a=>a.estado!=='ejecutada').length;}

// ── RENDER TABLERO ──
function renderTablero(){
  const icons={resultado:'ti-chart-bar',externas:'ti-world',internas:'ti-settings',desarrollo:'ti-rocket'};
  const dotCls={ok:'dok',risk:'drisk',pend:'dpend'};
  ['resultado','externas','internas','desarrollo'].forEach(cat=>{
    const vars=S.variables.filter(v=>v.categoria===cat);
    document.getElementById('cnt-'+cat).textContent=vars.length+(vars.length===1?' variable':' variables');
    const bd=document.getElementById('bd-'+cat);
    if(!vars.length){bd.innerHTML='<div class="es"><i class="ti '+icons[cat]+'"></i>Sin variables aún</div>';return;}
    bd.innerHTML=vars.map(v=>{
      const st=getStatus(v),last=lastLog(v);
      const meta=last?last.anio+': '+last.logrado+(v.unidad?' '+v.unidad:''):v.frecuencia;
      const pend=pendActs(v);
      const badge=(v.actividades||[]).length?'<span class="ab">'+pend+' pend.</span>':'';
      const fn=isRent(v)?'abrirRent()':'abrirVar(\''+v.id+'\')';
      return '<div class="vi" onclick="'+fn+'"><div><div class="vn">'+h(v.nombre)+'</div><div class="vm">'+h(meta)+'</div></div><div class="vr">'+badge+'<div class="dot '+dotCls[st]+'"></div></div></div>';
    }).join('');
  });
}

// ── RENDER AGENDA ──
function renderAgenda(){
  const hoy=new Date();hoy.setHours(0,0,0,0);
  let items=[];
  S.variables.forEach(v=>{(v.actividades||[]).forEach(a=>{if(a.estado==='ejecutada')return;if(filtro!=='todas'&&a.estado!==filtro)return;items.push({a,varId:v.id,varNombre:v.nombre,cat:v.categoria});});});
  document.getElementById('agendaCount').textContent=items.length;
  if(!items.length){document.getElementById('agendaList').innerHTML='<div class="ae2"><i class="ti ti-check"></i>Sin actividades pendientes</div>';return;}
  function ts(x){return x.a.fecha?new Date(x.a.fecha+'T00:00:00').getTime():Infinity;}
  items.sort((a,b)=>ts(a)-ts(b));
  function tipo(x){if(!x.a.fecha)return's';const d=new Date(x.a.fecha+'T00:00:00');d.setHours(0,0,0,0);if(d<hoy)return'v';if(d.getTime()===hoy.getTime())return'h';return'p';}
  function fmtF(f){if(!f)return null;const d=new Date(f+'T00:00:00');return d.toLocaleDateString('es-AR',{day:'2-digit',month:'short',year:'numeric'});}
  const grupos=[{k:'v',l:'Vencidas',items:[]},{k:'h',l:'Hoy',items:[]},{k:'p',l:'Próximas',items:[]},{k:'s',l:'Sin fecha',items:[]}];
  items.forEach(x=>{grupos.find(g=>g.k===tipo(x)).items.push(x);});
  const fcls={v:'fv',h:'fh',p:'fp',s:'fs'};
  const acls={v:'v',h:'h',p:'p',s:'s'};
  let out='';
  grupos.forEach(g=>{
    if(!g.items.length)return;
    out+='<div class="df">'+g.l+'</div>';
    g.items.forEach(x=>{
      const col=CAT_COL[x.cat];const em=EST[x.a.estado]||EST.pendiente;
      const ft=x.a.fecha?fmtF(x.a.fecha):'Sin fecha';
      const fn=isRent({nombre:x.varNombre})?'abrirRent()':'abrirVar(\''+x.varId+'\')';
      out+='<div class="ai '+acls[tipo(x)]+'" onclick="'+fn+'"><div class="ad">'+h(x.a.descripcion)+'</div>'+(x.a.responsable?'<div class="ar"><i class="ti ti-user" style="font-size:11px;vertical-align:-1px"></i> '+h(x.a.responsable)+'</div>':'')+'<div class="ab2"><span class="av" style="background:'+col.bg+';color:'+col.tx+'">'+h(x.varNombre)+'</span><div style="display:flex;align-items:center;gap:5px"><span class="ae '+em.s+'">'+em.l+'</span><span class="af2 '+fcls[tipo(x)]+'"><i class="ti ti-calendar" style="font-size:11px;vertical-align:-1px"></i> '+ft+'</span></div></div></div>';
    });
  });
  document.getElementById('agendaList').innerHTML=out;
}

function fmtSize(b){if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(1)+'KB';return(b/1048576).toFixed(1)+'MB';}

function renderAdjuntos(adjs,pfx,i){
  if(!adjs||!adjs.length)return '<div style="font-size:11px;color:var(--text3);padding:3px 0">Sin adjuntos</div>';
  return adjs.map((adj,ai)=>{
    const isImg=/\.(png|jpe?g|gif|webp|bmp|svg)$/i.test(adj.nombre);
    const thumb=isImg?'<img class="adjunto-thumb" src="'+adj.data+'" onclick="openLightbox(\''+adj.data+'\')" alt="'+h(adj.nombre)+'"/>':'<div class="adjunto-icon"><i class="ti '+fileIcon(adj.nombre)+'"></i></div>';
    return '<div class="adjunto-item">'+thumb+'<div class="adjunto-info"><div class="adjunto-name">'+h(adj.nombre)+'</div><div class="adjunto-size">'+adj.size+'</div></div><div class="adjunto-btns">'+(isImg?'<button class="adjunto-btn" onclick="openLightbox(\''+adj.data+'\')"><i class="ti ti-eye"></i></button>':'')+'<a class="adjunto-btn" href="'+adj.data+'" download="'+h(adj.nombre)+'"><i class="ti ti-download"></i></a><button class="adjunto-btn" style="color:#D85A30" onclick="elimAdj_'+pfx+'('+i+','+ai+')"><i class="ti ti-trash"></i></button></div></div>';
  }).join('');
}

function fileIcon(n){
  if(/\.(png|jpe?g|gif|webp|bmp|svg)$/i.test(n))return 'ti-photo';
  if(/\.pdf$/i.test(n))return 'ti-file-type-pdf';
  if(/\.(xlsx?|csv)$/i.test(n))return 'ti-file-spreadsheet';
  if(/\.(docx?)$/i.test(n))return 'ti-file-word';
  return 'ti-file';
}

function _addAdjuntoToAct(pfx,i,files){
  const getAct=pfx==='rent'?()=>{const v=getRentVar();return v?v.actividades[i]:null;}:()=>{const v=getV();return v?v.actividades[i]:null;};
  const a=getAct();if(!a)return;
  if(!a.adjuntos)a.adjuntos=[];
  let loaded=0;
  Array.from(files).forEach(file=>{
    const reader=new FileReader();
    reader.onload=function(ev){
      a.adjuntos.push({nombre:file.name,size:fmtSize(file.size),data:ev.target.result});
      loaded++;
      if(loaded===files.length){
        save();
        const el=document.getElementById('adjs_'+pfx+'_'+i);
        if(el)el.innerHTML=renderAdjuntos(a.adjuntos,pfx,i);
        toast('Archivo adjuntado');
      }
    };
    reader.readAsDataURL(file);
  });
}

// ── GOOGLE DRIVE INTEGRATION ──
const GCLIENT_ID = '995640298856-ih628f2ssme9n51a14ie23traadi12bj.apps.googleusercontent.com';
const GSCOPES = 'https://www.googleapis.com/auth/drive.appdata https://www.googleapis.com/auth/drive.file';
const DRIVE_FILENAME = 'tablero_agro_2030_datos.json';

let gTokenClient = null;
let gAccessToken = null;
let gFileId = null;
let gUserEmail = '';
let driveReady = false;

// Cargar librerías de Google dinámicamente
function loadScript(src, cb) {
  const s = document.createElement('script');
  s.src = src;
  s.onload = cb;
  s.onerror = () => console.error('Error cargando:', src);
  document.head.appendChild(s);
}

function initDrive() {
  // Cargar gsi/client primero
  loadScript('https://accounts.google.com/gsi/client', function() {
    // Luego cargar gapi
    loadScript('https://apis.google.com/js/api.js', function() {
      gapi.load('client', function() {
        gapi.client.init({
          discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest']
        }).then(function() {
          // Inicializar token client
          gTokenClient = google.accounts.oauth2.initTokenClient({
            client_id: GCLIENT_ID,
            scope: GSCOPES,
            callback: async function(resp) {
              if (resp.error) { setDriveError('Error: ' + resp.error); return; }
              gAccessToken = resp.access_token;
              gapi.client.setToken({access_token: gAccessToken});
              sessionStorage.setItem('gAccessToken', gAccessToken);
              try {
                const me = await gapi.client.request({path: 'https://www.googleapis.com/oauth2/v2/userinfo'});
                gUserEmail = me.result.email || '';
                sessionStorage.setItem('gUserEmail', gUserEmail);
              } catch(e) {}
              setDriveConnected();
              await driveFindOrCreate();
              await driveLoad();
              toast('Conectado a Google Drive ✓');
            }
          });
          driveReady = true;
          // Habilitar botón
          const btn = document.getElementById('btnDriveConnect');
          if (btn) { btn.disabled = false; btn.style.opacity = '1'; }
          document.getElementById('driveStatusTxt').textContent = 'No conectado a Google Drive';
          // Restaurar sesión guardada
          const savedToken = sessionStorage.getItem('gAccessToken');
          if (savedToken) {
            gAccessToken = savedToken;
            gUserEmail = sessionStorage.getItem('gUserEmail') || '';
            gFileId = sessionStorage.getItem('gFileId') || null;
            gapi.client.setToken({access_token: gAccessToken});
            setDriveConnected();
          }
        }).catch(function(e) {
          setDriveError('Error iniciando Drive');
          console.error(e);
        });
      });
    });
  });
}

// Iniciar cuando el DOM esté listo
window.addEventListener('load', initDrive);

function driveLogin() {
  if (!driveReady || !gTokenClient) {
    document.getElementById('driveStatusTxt').textContent = 'Iniciando conexión...';
    setTimeout(driveLogin, 500);
    return;
  }
  gTokenClient.requestAccessToken({prompt: ''});
}

function driveLogout() {
  if (gAccessToken) google.accounts.oauth2.revoke(gAccessToken);
  gAccessToken = null; gFileId = null; gUserEmail = '';
  sessionStorage.removeItem('gAccessToken');
  sessionStorage.removeItem('gUserEmail');
  sessionStorage.removeItem('gFileId');
  setDriveDisconnected();
  toast('Desconectado de Drive');
}

function setDriveConnected() {
  document.getElementById('driveDot').className = 'drive-dot connected';
  document.getElementById('driveStatusTxt').textContent = 'Conectado a Google Drive';
  document.getElementById('driveUser').textContent = gUserEmail;
  document.getElementById('btnDriveConnect').style.display = 'none';
  document.getElementById('btnDriveSync').style.display = '';
  document.getElementById('btnDriveLoad').style.display = '';
  document.getElementById('btnDriveDisconnect').style.display = '';
}

function setDriveSyncing(msg) {
  document.getElementById('driveDot').className = 'drive-dot syncing';
  document.getElementById('driveStatusTxt').textContent = msg || 'Sincronizando...';
}

function setDriveError(msg) {
  document.getElementById('driveDot').className = 'drive-dot error';
  document.getElementById('driveStatusTxt').textContent = msg || 'Error de conexión';
}

function setDriveDisconnected() {
  document.getElementById('driveDot').className = 'drive-dot';
  document.getElementById('driveStatusTxt').textContent = 'No conectado a Google Drive';
  document.getElementById('driveUser').textContent = '';
  document.getElementById('driveLast').textContent = '';
  document.getElementById('btnDriveConnect').style.display = '';
  document.getElementById('btnDriveSync').style.display = 'none';
  document.getElementById('btnDriveLoad').style.display = 'none';
  document.getElementById('btnDriveDisconnect').style.display = 'none';
}

function setDriveLast() {
  const now = new Date().toLocaleString('es-AR', {day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'});
  document.getElementById('driveLast').textContent = 'Última sync: ' + now;
}

async function driveFindOrCreate() {
  if (!gAccessToken) return;
  try {
    const list = await gapi.client.drive.files.list({
      spaces: 'appDataFolder',
      q: "name='" + DRIVE_FILENAME + "'",
      fields: 'files(id,name)'
    });
    if (list.result.files && list.result.files.length > 0) {
      gFileId = list.result.files[0].id;
    } else {
      const meta = await gapi.client.drive.files.create({
        resource: {name: DRIVE_FILENAME, parents: ['appDataFolder']},
        fields: 'id'
      });
      gFileId = meta.result.id;
    }
    sessionStorage.setItem('gFileId', gFileId);
  } catch(e) {
    setDriveError('Error buscando archivo');
    console.error(e);
  }
}

async function driveSave() {
  if (!gAccessToken) { toast('Conectate a Drive primero'); return; }
  if (!gFileId) await driveFindOrCreate();
  setDriveSyncing('Guardando en Drive...');
  try {
    await fetch('https://www.googleapis.com/upload/drive/v3/files/' + gFileId + '?uploadType=media', {
      method: 'PATCH',
      headers: {'Authorization': 'Bearer ' + gAccessToken, 'Content-Type': 'application/json'},
      body: JSON.stringify(S, null, 2)
    });
    setDriveConnected();
    setDriveLast();
  } catch(e) {
    setDriveError('Error al guardar');
    console.error(e);
  }
}

async function driveLoad() {
  if (!gAccessToken) { toast('Conectate a Drive primero'); return; }
  if (!gFileId) await driveFindOrCreate();
  if (!gFileId) return;
  setDriveSyncing('Cargando desde Drive...');
  try {
    const resp = await fetch('https://www.googleapis.com/drive/v3/files/' + gFileId + '?alt=media', {
      headers: {'Authorization': 'Bearer ' + gAccessToken}
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const text = await resp.text();
    if (!text || text.trim() === '') { setDriveConnected(); return; }
    const p = JSON.parse(text);
    if (!p.variables) throw new Error('Formato inválido');
    S = p;
    if (!S.rentabilidad) S.rentabilidad = {};
    if (!S.ejercicios) S.ejercicios = [];
    save(); renderAll();
    setDriveConnected();
    setDriveLast();
    toast('Datos cargados desde Drive ✓');
  } catch(e) {
    setDriveError('Error al cargar');
    console.error(e);
  }
}

// Auto-guardar en Drive cada vez que se modifica state
const _origSave = save;
function save() {
  _origSave();
  if (gAccessToken && gFileId) {
    clearTimeout(window._driveSaveTimer);
    window._driveSaveTimer = setTimeout(driveSave, 2000);
  }
}
